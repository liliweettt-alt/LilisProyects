<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Log & Character Viewer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e5ddd5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        input[type="file"] {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #f9f9f9;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            background-color: #dcf8c6;
            border-bottom-right-radius: 0;
        }
        .ai-message {
            align-self: flex-start;
            background-color: #ffffff;
            border-bottom-left-radius: 0;
        }
        .message-header {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .message-body {
            font-size: 1em;
            line-height: 1.5;
            color: #333;
        }
        .message-body em {
            color: #555;
        }
        .character-card {
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            line-height: 1.6;
        }
        .character-card h2 { 
            margin-top: 0; 
            color: #222;
            border-bottom: 2px solid #e5ddd5;
            padding-bottom: 10px;
        }
        .conversation-divider {
            text-align: center;
            color: #666;
            font-size: 0.85em;
            font-weight: bold;
            margin: 25px 0 10px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 20px;
            align-self: center;
            width: 80%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Character.AI Export Viewer</h1>
        <p>Select your <code>message.json</code> or <code>character.json</code> file below to format it into a readable interface.</p>
        <input type="file" id="fileInput" accept=".json">
    </div>

    <div id="output" class="chat-container"></div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    renderData(data, file.name);
                } catch (err) {
                    alert("Error reading JSON file. Make sure it's a valid JSON format.\n\nDetails: " + err.message);
                }
            };
            reader.readAsText(file);
        });

        function renderData(data, fileName) {
            const container = document.getElementById('output');
            container.innerHTML = ''; // Clear previous outputs

            const items = Array.isArray(data) ? data : [data];
            const isCharacterFile = fileName.toLowerCase().includes('character');

            if (isCharacterFile) {
                // Render characters as cards
                items.forEach(item => {
                    if (item.name || item.title) {
                        renderCharacter(item, container);
                    }
                });
            } else {
                // Parse and standardize messages
                const parsedMessages = [];

                items.forEach(msg => {
                    let text = msg.text || msg.raw_content || msg.content;
                    if (!text) return; 

                    let isUser = !!msg.src;
                    let sender = msg.src || (msg.candidate_id ? "AI" : "User");
                    if (msg.tgt && isUser) {
                        sender = `${msg.src} \u2192 ${msg.tgt}`;
                    }

                    // Grab timestamp (handles both user 'created' and AI 'create_time')
                    let rawTime = msg.created || msg.create_time;
                    let timestamp = rawTime ? new Date(rawTime) : new Date(0);

                    parsedMessages.push({ text, isUser, sender, timestamp });
                });

                // Sort everything chronologically!
                parsedMessages.sort((a, b) => a.timestamp - b.timestamp);

                // Render with conversation dividers
                let lastTime = null;
                const FOUR_HOURS_IN_MS = 4 * 60 * 60 * 1000;

                parsedMessages.forEach(msg => {
                    // If gap between messages is > 4 hours, start a new session visually
                    if (lastTime && (msg.timestamp - lastTime > FOUR_HOURS_IN_MS)) {
                        const divider = document.createElement('div');
                        divider.classList.add('conversation-divider');
                        divider.innerText = "New Conversation Session";
                        container.appendChild(divider);
                    }
                    lastTime = msg.timestamp;

                    renderMessage(msg, container);
                });
            }
        }

        function renderCharacter(char, container) {
            const card = document.createElement('div');
            card.classList.add('character-card');

            const title = char.name || char.title || "Unknown Character";
            const formatText = (text) => text ? text.replace(/\\n/g, '<br>').replace(/\n/g, '<br>') : 'N/A';

            const greeting = char.greeting ? `<p><strong>Greeting:</strong><br>${formatText(char.greeting)}</p>` : '';
            const description = char.description ? `<p><strong>Description:</strong><br>${formatText(char.description)}</p>` : '';
            const definition = char.definition ? `<p><strong>Definition:</strong><br>${formatText(char.definition)}</p>` : '';

            card.innerHTML = `<h2>${title}</h2>${greeting}${description}${definition}`;
            container.appendChild(card);
        }

        function renderMessage(msg, container) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(msg.isUser ? 'user-message' : 'ai-message');

            const headerDiv = document.createElement('div');
            headerDiv.classList.add('message-header');
            
            let timeStr = msg.timestamp.getTime() > 0 ? msg.timestamp.toLocaleString() : "";
            headerDiv.innerText = `${msg.sender} ${timeStr ? ' \u2022 ' + timeStr : ''}`;

            const bodyDiv = document.createElement('div');
            bodyDiv.classList.add('message-body');
            
            let formattedText = msg.text.replace(/\\n/g, '\n').replace(/\n/g, '<br>');
            formattedText = formattedText.replace(/\*(.*?)\*/g, '<em>*$1*</em>');
            bodyDiv.innerHTML = formattedText;

            messageDiv.appendChild(headerDiv);
            messageDiv.appendChild(bodyDiv);
            container.appendChild(messageDiv);
        }
    </script>
</body>
</html>

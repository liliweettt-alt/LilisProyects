<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Archive - Conversation Reader</title>
<style>
  :root {
    --bg-color: #1e1b18; 
    --sidebar-bg: #27231f;
    --chat-bg: #24211d;
    --text-primary: #d4c8b8;
    --text-secondary: #a89f91;
    --accent: #8b6d4b;
    --msg-user: #43362a;
    --msg-ai: #2d2925;
    --border: #3d3630;
  }

  body {
    margin: 0;
    font-family: 'Georgia', serif;
    background-color: var(--bg-color);
    color: var(--text-primary);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar Styling */
  #sidebar {
    width: 320px;
    background-color: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .header-area {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-size: 1.3rem;
    margin: 0 0 5px 0;
    color: var(--accent);
    font-weight: normal;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-bottom: 15px;
    font-style: italic;
  }

  input[type="file"] {
    font-size: 0.9rem;
    color: var(--text-secondary);
    width: 100%;
    cursor: pointer;
  }

  #contact-list {
    list-style: none;
    padding: 0;
    margin: 0;
    overflow-y: auto;
    flex: 1;
  }

  #contact-list li {
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s ease;
    font-size: 1.1rem;
  }

  #contact-list li:hover, #contact-list li.active {
    background-color: var(--msg-user);
    color: #fff;
  }

  /* Chat Area Styling */
  #chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background-color: var(--chat-bg);
  }

  #chat-header {
    padding: 20px 30px;
    border-bottom: 1px solid var(--border);
    font-size: 1.4rem;
    color: var(--accent);
    background-color: var(--sidebar-bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .hint {
    font-size: 0.9rem;
    color: var(--text-secondary);
    font-style: italic;
  }

  #messages {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .msg {
    max-width: 65%;
    padding: 14px 18px;
    border-radius: 8px;
    line-height: 1.6;
    font-size: 1.05rem;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: transform 0.1s, background-color 0.2s;
  }

  .msg:hover {
    transform: scale(1.01);
  }

  .msg i {
    color: var(--text-secondary);
  }

  .msg-user {
    align-self: flex-end;
    background-color: var(--msg-user);
    border-bottom-right-radius: 0;
  }

  .msg-ai {
    align-self: flex-start;
    background-color: var(--msg-ai);
    border: 1px solid var(--border);
    border-bottom-left-radius: 0;
  }

  .time {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 8px;
    text-align: right;
    display: block;
  }

  /* Scrollbar Customization */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-color); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>

<div id="sidebar">
  <div class="header-area">
    <h1>The Archive</h1>
    <div class="subtitle">Click any message to swap sides!</div>
    <input type="file" id="file-input" accept=".json" />
  </div>
  <ul id="contact-list"></ul>
</div>

<div id="chat-area">
  <div id="chat-header">
    <span>Select a conversation</span>
    <span class="hint">Click a message to switch its sender</span>
  </div>
  <div id="messages"></div>
</div>

<script>
  let conversations = {};

  document.getElementById('file-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        processData(data);
      } catch (err) {
        alert("Error reading JSON file.");
        console.error(err);
      }
    };
    reader.readAsText(file);
  });

  function processData(data) {
    let mapped = [];

    // 1. Separate the two completely different JSON formats
    data.forEach(item => {
      if (item.src && item.tgt && item.text) {
        // Old Format (mostly just your exported messages)
        mapped.push({
          id: "old_" + item.tgt,
          name: item.tgt + " (Old Archive)",
          text: item.text,
          time: new Date(item.created || item.create_time),
          isUser: true // These are almost always Elizabeth
        });
      } else if (item.chat_id && item.raw_content) {
        // New Format (contains the interleaved back-and-forth)
        mapped.push({
          id: item.chat_id,
          text: item.raw_content,
          time: new Date(item.create_time)
        });
      }
    });

    // 2. Group by chat session
    let groups = {};
    mapped.forEach(m => {
      if (!groups[m.id]) groups[m.id] = [];
      groups[m.id].push(m);
    });

    conversations = {};

    // 3. Sort chronologically and figure out who the character is
    for (let id in groups) {
      let msgs = groups[id];
      msgs.sort((a, b) => a.time - b.time);
      
      let name = msgs[0].name; 
      
      // Auto-detect the character name by scanning the chat text
      if (!name) {
        let sample = msgs.slice(0, 15).map(m => m.text).join(" ");
        if (sample.includes("Miguel")) name = "Miguel O'Hara";
        else if (sample.includes("Draco") || sample.includes("Malfoy")) name = "Draco Malfoy";
        else if (sample.includes("Loki")) name = "Loki";
        else if (sample.includes("Hermione") || sample.includes("Granger")) name = "Hermione Granger";
        else if (sample.includes("Sebastian") || sample.includes("Sallow")) name = "Sebastian Sallow";
        else if (sample.includes("Spencer") || sample.includes("Reid")) name = "Spencer Reid";
        else if (sample.includes("Snape")) name = "Severus Snape";
        else if (sample.includes("Ominis")) name = "Ominis Gaunt";
        else name = "Unknown Chat (" + id.substring(0, 4) + ")";
      }

      // Figure out who is talking based on your RP style
      let currentUser = true;
      msgs.forEach((m, i) => {
        if (m.isUser !== undefined) return; // Skip if already set
        
        let t = m.text;
        if (t.includes("*She ") || t.includes("*I ") || t.startsWith("AJ:") || t.startsWith("Elizabeth:")) {
          currentUser = true;
        } else if (t.includes("*He ") || t.includes("Draco:") || t.includes("Miguel:") || t.includes("Loki:")) {
          currentUser = false;
        } else {
          // If unsure, alternate from the previous message
          if (i > 0) currentUser = !msgs[i-1].isUser;
        }
        m.isUser = currentUser;
      });

      // Handle names overlapping (e.g. if you have multiple separate chats with Miguel)
      let finalName = name;
      let counter = 2;
      while (conversations[finalName]) {
        finalName = name + " (Chat " + counter + ")";
        counter++;
      }
      conversations[finalName] = msgs;
    }

    renderContacts();
  }

  function formatText(text) {
    const div = document.createElement('div');
    div.innerText = text; 
    let escaped = div.innerHTML;
    escaped = escaped.replace(/\*([^*]+)\*/g, '<i>*$1*</i>');
    return escaped.replace(/\n/g, '<br>');
  }

  function renderContacts() {
    const list = document.getElementById('contact-list');
    list.innerHTML = '';
    
    Object.keys(conversations).forEach(char => {
      const li = document.createElement('li');
      li.textContent = char;
      li.onclick = () => {
        document.querySelectorAll('#contact-list li').forEach(el => el.classList.remove('active'));
        li.classList.add('active');
        renderMessages(char);
      };
      list.appendChild(li);
    });

    if (Object.keys(conversations).length > 0) {
      list.firstChild.click();
    }
  }

  function renderMessages(char) {
    document.getElementById('chat-header').firstElementChild.textContent = char;
    const msgContainer = document.getElementById('messages');
    msgContainer.innerHTML = '';

    conversations[char].forEach(m => {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg ' + (m.isUser ? 'msg-user' : 'msg-ai');
      
      const timeStr = m.time.toLocaleDateString() + ' ' + m.time.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
      
      msgDiv.innerHTML = formatText(m.text) + `<span class="time">${timeStr}</span>`;
      
      // Allow user to click to manually swap sides
      msgDiv.onclick = function() {
        if (this.classList.contains('msg-user')) {
          this.classList.remove('msg-user');
          this.classList.add('msg-ai');
        } else {
          this.classList.remove('msg-ai');
          this.classList.add('msg-user');
        }
      };

      msgContainer.appendChild(msgDiv);
    });
    
    msgContainer.scrollTop = msgContainer.scrollHeight;
  }
</script>

</body>
</html>

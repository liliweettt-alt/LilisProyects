<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Log & Character Viewer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e5ddd5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        input[type="file"] {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #f9f9f9;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            background-color: #dcf8c6;
            border-bottom-right-radius: 0;
        }
        .ai-message {
            align-self: flex-start;
            background-color: #ffffff;
            border-bottom-left-radius: 0;
        }
        .message-header {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .message-body {
            font-size: 1em;
            line-height: 1.5;
            color: #333;
        }
        .message-body em {
            color: #555;
        }
        .character-card {
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            line-height: 1.6;
        }
        .character-card h2 { 
            margin-top: 0; 
            color: #222;
            border-bottom: 2px solid #e5ddd5;
            padding-bottom: 10px;
        }
        .character-card strong {
            color: #444;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Character.AI Export Viewer</h1>
        <p>Select your <code>message.json</code> or <code>character.json</code> file below to format it into a readable interface.</p>
        <input type="file" id="fileInput" accept=".json">
    </div>

    <div id="output" class="chat-container"></div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    renderData(data, file.name);
                } catch (err) {
                    alert("Error reading JSON file. Make sure it's a valid JSON format.\n\nDetails: " + err.message);
                }
            };
            reader.readAsText(file);
        });

        function renderData(data, fileName) {
            const container = document.getElementById('output');
            container.innerHTML = ''; // Clear previous outputs

            // Normalize the data array (in case it's a single object)
            const items = Array.isArray(data) ? data : [data];
            const isCharacterFile = fileName.toLowerCase().includes('character');

            items.forEach(item => {
                if (isCharacterFile || item.name || item.title) {
                    renderCharacter(item, container);
                } else {
                    renderMessage(item, container);
                }
            });
        }

        function renderCharacter(char, container) {
            const card = document.createElement('div');
            card.classList.add('character-card');

            const title = char.name || char.title || "Unknown Character";
            
            // Safely parse out text and replace line breaks
            const formatText = (text) => text ? text.replace(/\\n/g, '<br>').replace(/\n/g, '<br>') : 'N/A';

            const greeting = char.greeting ? `<p><strong>Greeting:</strong><br>${formatText(char.greeting)}</p>` : '';
            const description = char.description ? `<p><strong>Description:</strong><br>${formatText(char.description)}</p>` : '';
            const definition = char.definition ? `<p><strong>Definition:</strong><br>${formatText(char.definition)}</p>` : '';

            card.innerHTML = `
                <h2>${title}</h2>
                ${greeting}
                ${description}
                ${definition}
            `;
            container.appendChild(card);
        }

        function renderMessage(msg, container) {
            // Your message.json utilizes a mix of raw_content and text schemas
            const text = msg.text || msg.raw_content || msg.content;
            if (!text) return; 

            // Determine if the message came from the user or the AI character
            let senderName = msg.src || (msg.candidate_id ? "AI" : "User");
            let isUser = false;
            
            // Logic tailored to your JSON parameters
            if (msg.src) {
                isUser = true; // In your format, 'src' indicates the human persona
            } else if (msg.candidate_id) {
                isUser = false; // AI responses
            }

            let time = msg.created || msg.create_time || "";
            if (time) {
                time = new Date(time).toLocaleString();
            }

            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(isUser ? 'user-message' : 'ai-message');

            const headerDiv = document.createElement('div');
            headerDiv.classList.add('message-header');
            
            let displaySender = senderName;
            if (msg.tgt) {
                displaySender = isUser ? `${msg.src} \u2192 ${msg.tgt}` : senderName;
            }

            headerDiv.innerText = `${displaySender} ${time ? ' \u2022 ' + time : ''}`;

            const bodyDiv = document.createElement('div');
            bodyDiv.classList.add('message-body');
            
            // Format text (converting \n to actual line breaks and asterisk-wrapped text into italics)
            let formattedText = text.replace(/\\n/g, '\n').replace(/\n/g, '<br>');
            formattedText = formattedText.replace(/\*(.*?)\*/g, '<em>*$1*</em>'); // Retains italic styling for actions
            bodyDiv.innerHTML = formattedText;

            messageDiv.appendChild(headerDiv);
            messageDiv.appendChild(bodyDiv);
            container.appendChild(messageDiv);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Archive - Conversation Reader</title>
<style>
  :root {
    --bg-color: #1e1b18; 
    --sidebar-bg: #27231f;
    --chat-bg: #24211d;
    --text-primary: #d4c8b8;
    --text-secondary: #a89f91;
    --accent: #8b6d4b;
    --msg-user: #43362a;
    --msg-ai: #2d2925;
    --border: #3d3630;
  }

  body {
    margin: 0;
    font-family: 'Georgia', serif;
    background-color: var(--bg-color);
    color: var(--text-primary);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar Styling */
  #sidebar {
    width: 320px;
    background-color: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .header-area {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-size: 1.3rem;
    margin: 0 0 15px 0;
    color: var(--accent);
    font-weight: normal;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  input[type="file"] {
    font-size: 0.9rem;
    color: var(--text-secondary);
    width: 100%;
    cursor: pointer;
  }

  #contact-list {
    list-style: none;
    padding: 0;
    margin: 0;
    overflow-y: auto;
    flex: 1;
  }

  #contact-list li {
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s ease;
    font-size: 1.1rem;
  }

  #contact-list li:hover, #contact-list li.active {
    background-color: var(--msg-user);
    color: #fff;
  }

  /* Chat Area Styling */
  #chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background-color: var(--chat-bg);
  }

  #chat-header {
    padding: 20px 30px;
    border-bottom: 1px solid var(--border);
    font-size: 1.4rem;
    color: var(--accent);
    background-color: var(--sidebar-bg);
  }

  #messages {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .msg {
    max-width: 65%;
    padding: 14px 18px;
    border-radius: 8px;
    line-height: 1.6;
    font-size: 1.05rem;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }

  .msg i {
    color: var(--text-secondary);
  }

  .msg-user {
    align-self: flex-end;
    background-color: var(--msg-user);
    border-bottom-right-radius: 0;
  }

  .msg-ai {
    align-self: flex-start;
    background-color: var(--msg-ai);
    border: 1px solid var(--border);
    border-bottom-left-radius: 0;
  }

  .time {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 8px;
    text-align: right;
    display: block;
  }

  /* Scrollbar Customization */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-color); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>

<div id="sidebar">
  <div class="header-area">
    <h1>The Archive</h1>
    <input type="file" id="file-input" accept=".json" />
  </div>
  <ul id="contact-list"></ul>
</div>

<div id="chat-area">
  <div id="chat-header">Select a file to begin</div>
  <div id="messages"></div>
</div>

<script>
  let conversations = {};

  // Listen for the user uploading the JSON file
  document.getElementById('file-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        processData(data);
      } catch (err) {
        alert("Error reading JSON file. Make sure it is formatted correctly.");
        console.error(err);
      }
    };
    reader.readAsText(file);
  });

  function processData(data) {
    // 1. Normalize the properties since the AI and User objects use different keys
    let mapped = data.map(item => {
      const isUser = item.src !== undefined; 
      const text = isUser ? item.text : item.raw_content;
      const timeStr = isUser ? item.created : item.create_time;
      const tgt = item.tgt || null;
      
      return {
        isUser,
        text,
        time: new Date(timeStr),
        tgt
      };
    }).filter(m => m.text); // Filter out any empty/broken data

    // 2. Sort chronologically
    mapped.sort((a, b) => a.time - b.time);

    conversations = {};
    let currentCharacter = "Unknown AI";

    // 3. Group into individual character conversations based on timeline
    mapped.forEach(m => {
      if (m.isUser && m.tgt) {
        currentCharacter = m.tgt;
      }
      
      if (!conversations[currentCharacter]) {
        conversations[currentCharacter] = [];
      }
      conversations[currentCharacter].push(m);
    });

    renderContacts();
  }

  // Parses markdown-like asterisks into italicized actions for better reading
  function formatText(text) {
    const div = document.createElement('div');
    div.innerText = text; // Safe escape
    let escaped = div.innerHTML;
    
    escaped = escaped.replace(/\*([^*]+)\*/g, '<i>*$1*</i>');
    return escaped.replace(/\n/g, '<br>');
  }

  function renderContacts() {
    const list = document.getElementById('contact-list');
    list.innerHTML = '';
    
    Object.keys(conversations).forEach(char => {
      const li = document.createElement('li');
      li.textContent = char;
      li.onclick = () => {
        // Highlight active contact
        document.querySelectorAll('#contact-list li').forEach(el => el.classList.remove('active'));
        li.classList.add('active');
        renderMessages(char);
      };
      list.appendChild(li);
    });

    // Auto-load the first conversation if available
    if (Object.keys(conversations).length > 0) {
      list.firstChild.click();
    }
  }

  function renderMessages(char) {
    document.getElementById('chat-header').textContent = char;
    const msgContainer = document.getElementById('messages');
    msgContainer.innerHTML = '';

    conversations[char].forEach(m => {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg ' + (m.isUser ? 'msg-user' : 'msg-ai');
      
      const timeStr = m.time.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
      
      msgDiv.innerHTML = formatText(m.text) + `<span class="time">${timeStr}</span>`;
      msgContainer.appendChild(msgDiv);
    });
    
    // Auto-scroll to bottom of the chat
    msgContainer.scrollTop = msgContainer.scrollHeight;
  }
</script>

</body>
</html>
